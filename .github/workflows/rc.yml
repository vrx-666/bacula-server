name: Build and publish RC image (GHCR only)

on:
  workflow_dispatch:        # manual trigger only (UI button + API)

jobs:
  build:
    if: github.repository == 'vrx-666/bacula-server'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR
    strategy:
      fail-fast: false
      matrix:
        db: [postgresql, sqlite3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Bacula version
        id: ver
        run: |
          # VERSION holds <bacula_version>.<build_seed>, e.g. 15.20
          SEED=$(tr -d '[:space:]' < VERSION)
          echo "version=${SEED%.*}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push RC (${{ matrix.db }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            DB=${{ matrix.db }}
            BACULAV=${{ steps.ver.outputs.version }}
          tags: ghcr.io/vrx-666/bacula-server:rc_${{ matrix.db }}
          cache-from: type=gha,scope=${{ matrix.db }}
          cache-to: type=gha,mode=max,scope=${{ matrix.db }}
